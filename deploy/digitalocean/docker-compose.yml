services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file: .env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ${IMAGE_REPO:-cajaks2/chp-live-map}:${VERSION:-0.1.117}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MAP_HOURS: "72"
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: "8080"
      BASE_PATH: /
      PUBLIC_URL: https://crestmap.us/
      SERVICE_VERSION: ${VERSION:-0.1.117}
      GOOGLE_ANALYTICS_ID: ${GOOGLE_ANALYTICS_ID:-}
      DATABASE_POOL_MIN: ${DATABASE_POOL_MIN:-1}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-5}
      WEB_WORKERS: ${WEB_WORKERS:-1}
    ports:
      - "127.0.0.1:8080:8080"

  scrape:
    image: ${IMAGE_REPO:-cajaks2/chp-live-map}:${VERSION:-0.1.117}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SERVICE_VERSION: ${VERSION:-0.1.117}
      CHP_SOURCE_MODE: ${CHP_SOURCE_MODE:-xml}
      CHP_XML_SHADOW_COMPARE: ${CHP_XML_SHADOW_COMPARE:-false}
      CHP_CONTACT_EMAIL: ${CHP_CONTACT_EMAIL:-}
      SCRAPER_METRICS_HOST: 0.0.0.0
      SCRAPER_METRICS_PORT: "8081"
    ports:
      - "127.0.0.1:8081:8081"
    command:
      - python3
      - /app/scrape_chp_traffic.py
      - --interval
      - "60"
      - --detail-refresh-minutes
      - "3"

  postgres-backup:
    image: postgres:16
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-21600}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./backups/postgres:/backups
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        mkdir -p /backups
        while true; do
          ts=$$(date -u +%Y%m%dT%H%M%SZ)
          tmp="/backups/$${POSTGRES_DB}-$${ts}.dump.tmp"
          out="/backups/$${POSTGRES_DB}-$${ts}.dump"
          pg_dump -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -Fc --clean --if-exists > "$${tmp}"
          mv "$${tmp}" "$${out}"
          find /backups -type f -name "$${POSTGRES_DB}-*.dump" -mtime +"$${BACKUP_RETENTION_DAYS}" -delete
          sleep "$${BACKUP_INTERVAL_SECONDS}"
        done

volumes:
  postgres-data:
