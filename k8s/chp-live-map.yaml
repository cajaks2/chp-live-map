apiVersion: v1
kind: Namespace
metadata:
  name: chp-live-map
---
apiVersion: v1
kind: Secret
metadata:
  name: chp-live-map-db
  namespace: chp-live-map
type: Opaque
stringData:
  POSTGRES_DB: chp_map
  POSTGRES_USER: chp_map
  POSTGRES_PASSWORD: change-me
  DATABASE_URL: postgresql://chp_map:change-me@chp-live-map-postgres:5432/chp_map
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chp-live-map-postgres-data
  namespace: chp-live-map
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: chp-live-map-postgres
  namespace: chp-live-map
spec:
  serviceName: chp-live-map-postgres
  replicas: 1
  selector:
    matchLabels:
      app: chp-live-map-postgres
  template:
    metadata:
      labels:
        app: chp-live-map-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: chp-live-map-db
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: chp-live-map-db
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chp-live-map-db
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - chp_map
                - -d
                - chp_map
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - chp_map
                - -d
                - chp_map
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: chp-live-map-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: chp-live-map-postgres
  namespace: chp-live-map
spec:
  type: ClusterIP
  selector:
    app: chp-live-map-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chp-live-map-scrape
  namespace: chp-live-map
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: chp-live-map-scrape
  template:
    metadata:
      labels:
        app: chp-live-map-scrape
    spec:
      containers:
        - name: scrape
          image: cajaks2/chp-live-map:0.1.88
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - /app/scrape_chp_traffic.py
            - --interval
            - "60"
            - --detail-refresh-minutes
            - "3"
          ports:
            - name: metrics
              containerPort: 8081
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: chp-live-map-db
                  key: DATABASE_URL
            - name: SERVICE_VERSION
              value: "0.1.88"
            - name: CHP_USER_AGENT
              value: "chp-live-map/0.1 (+https://crestmap.us/)"
            - name: SCRAPER_METRICS_HOST
              value: 0.0.0.0
            - name: SCRAPER_METRICS_PORT
              value: "8081"
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: chp-live-map-scrape
  namespace: chp-live-map
spec:
  type: ClusterIP
  selector:
    app: chp-live-map-scrape
  ports:
    - name: metrics
      port: 8081
      targetPort: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chp-live-map-web
  namespace: chp-live-map
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chp-live-map-web
  template:
    metadata:
      labels:
        app: chp-live-map-web
    spec:
      containers:
        - name: web
          image: cajaks2/chp-live-map:0.1.88
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - /app/serve_live_map.py
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: chp-live-map-db
                  key: DATABASE_URL
            - name: MAP_HOURS
              value: "72"
            - name: HTTP_PORT
              value: "8080"
            - name: SERVICE_VERSION
              value: "0.1.88"
            - name: BASE_PATH
              value: /
            - name: PUBLIC_URL
              value: https://crestmap.us/
            - name: GOOGLE_ANALYTICS_ID
              value: ""
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: chp-live-map
  namespace: chp-live-map
spec:
  type: ClusterIP
  selector:
    app: chp-live-map-web
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chp-live-map
  namespace: chp-live-map
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.middlewares: default-redirect-https@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: crestmap.us
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chp-live-map
                port:
                  number: 80
  tls:
    - hosts:
        - crestmap.us
      secretName: crestmap-us-tls
